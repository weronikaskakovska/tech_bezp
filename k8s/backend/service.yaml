# Bez Service każdy pod ma inny IP który się zmienia
# Service daje stały adres: "backend-service:3000"
# Kubernetes sam kieruje ruch do właściwego poda


apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: warehouse
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend-pdb
  namespace: warehouse
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: backend
