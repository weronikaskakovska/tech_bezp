#mówi Kubernetsowi uruchom 2 kopie backendu
#jeśli jedna padnie druga nadal działa
#używaj obrazu warehouse-backend:local
#przy aktualizacji używaj rolling update — najpierw uruchom nową wersję, dopiero potem wyłącz starą


apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: warehouse
  labels:
    app: backend
spec:
  replicas: 2  # 2 kopie
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate  # aktualizacja bez przestojów
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      initContainers:   #uruchom PRZED głównym kontenerem
        - name: wait-for-mongo  #czekaj aż MongoDB będzie gotowe
          image: busybox:1.36
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          command:
            - sh
            - -c
            - |
              until nc -z mongo-service 27017; do
                echo "Waiting for MongoDB..."
                sleep 3
              done
              echo "MongoDB is ready!"
        - name: wait-for-keycloak  #czekaj aż Keycloak będzie gotowy
          image: busybox:1.36
          securityContext:
            runAsNonRoot: true   #nie uruchamiaj jako root (bezpieczeństwo)
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          command:
            - sh
            - -c
            - |
              until nc -z keycloak-service 8080; do
                echo "Waiting for Keycloak..."
                sleep 5
              done
              echo "Keycloak is ready!"
      containers:
        - name: backend
          image: warehouse-backend:local
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: PORT
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: MONGO_URI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: JWT_SECRET
            - name: MQTT_BROKER
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: MQTT_BROKER
            - name: KEYCLOAK_URL
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: KEYCLOAK_URL
            - name: KEYCLOAK_REALM
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: KEYCLOAK_REALM
            - name: KEYCLOAK_CLIENT_ID
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: KEYCLOAK_CLIENT_ID
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: KEYCLOAK_CLIENT_SECRET
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: REDIS_PORT
          readinessProbe:   #czy aplikacja jest gotowa
            httpGet:
              path: /health  #Kubernetes pyta /health co 10 sek
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:   #czy aplikacja żyje
            httpGet:
              path: /health  # jeśli nie odpowie — restart
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"    #minimalne zasoby
              memory: "128Mi"
            limits:
              cpu: "500m"    #maksymalne zasoby
              memory: "512Mi"