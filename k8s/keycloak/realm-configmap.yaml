apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm-config
  namespace: warehouse
data:
  warehouse-realm.json: |
    {
      "realm": "warehouse",
      "enabled": true,
      "registrationAllowed": true,
      "loginWithEmailAllowed": true,
      "ssoSessionMaxLifespan": 36000,
      "accessTokenLifespan": 300,
      "clients": [
        {
          "clientId": "warehouse-frontend",
          "enabled": true,
          "publicClient": true,
          "redirectUris": ["http://localhost:3001/*", "http://warehouse.local/*"],
          "webOrigins": ["*"],
          "standardFlowEnabled": true,
          "attributes": {
            "pkce.code.challenge.method": "S256"
          }
        },
        {
          "clientId": "warehouse-backend",
          "enabled": true,
          "publicClient": false,
          "bearerOnly": true,
          "secret": "changeme"
        }
      ],
      "roles": {
        "realm": [
          { "name": "admin",     "description": "Administrator" },
          { "name": "moderator", "description": "Moderator" },
          { "name": "user",      "description": "Regular user" }
        ]
      },
      "users": [
        {
          "username": "admin",
          "enabled": true,
          "email": "admin@warehouse.local",
          "credentials": [{ "type": "password", "value": "Admin123!" }],
          "realmRoles": ["admin"]
        },
        {
          "username": "moderator",
          "enabled": true,
          "email": "moderator@warehouse.local",
          "credentials": [{ "type": "password", "value": "Mod123!" }],
          "realmRoles": ["moderator"]
        },
        {
          "username": "user",
          "enabled": true,
          "email": "user@warehouse.local",
          "credentials": [{ "type": "password", "value": "User123!" }],
          "realmRoles": ["user"]
        }
      ]
    }
