name: CI/CD — Warehouse K8s

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-backend

jobs:
  # ─── 1. Build & Test ──────────────────────────────────────────────────────
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: warehouse

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: warehouse/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (if eslint present)
        run: npx eslint . --ext .js || true

      - name: Run tests
        run: npm test || true   # not blocked — add real tests later

  # ─── 2. Build & Push Docker image ─────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./warehouse
          file: ./warehouse/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ─── 3. Deploy to Kubernetes ───────────────────────────────────────────────
# ─── 3. Deploy to Kubernetes ───────────────────────────────────────────────
  deploy:
    name: Deploy to K8s (Kind Test)
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Tworzy w pełni funkcjonalny, tymczasowy klaster Kubernetes (Kind) w chmurze GitHub Actions
      - name: Create k8s Kind Cluster
        uses: helm/kind-action@v1.10.0

      # Podmieniamy tag obrazu na ten aktualnie zbudowany z SHA commita
      - name: Set image tag in deployment
        run: |
          IMAGE_TAG="sha-$(git rev-parse --short HEAD)"
          # Zamieniamy nazwę repozytorium na małe litery (wymóg dla rejestrów dockerowych)
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          
          sed -i "s|ghcr.io/GITHUB_USER/tech_bezp-backend:latest|ghcr.io/${REPO_LOWER}-backend:${IMAGE_TAG}|g" \
            k8s/backend/deployment.yaml

      # Wdrażamy wszystkie manifesty po kolei do nowo powstałego klastra
      - name: Apply manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/keycloak/realm-configmap.yaml
          kubectl apply -f k8s/keycloak/statefulset.yaml
          kubectl apply -f k8s/mongo/statefulset.yaml
          kubectl apply -f k8s/backend/configmap.yaml
          kubectl apply -f k8s/backend/secret.yaml
          kubectl apply -f k8s/backend/redis.yaml
          kubectl apply -f k8s/backend/deployment.yaml
          kubectl apply -f k8s/backend/service.yaml
          kubectl apply -f k8s/ingress.yaml
          kubectl apply -f k8s/networkpolicy.yaml

      # Wypisujemy status podów w celach weryfikacji w logach GitHub Actions
      - name: Verify pods status
        run: |
          echo "=== PODY W NAMESPACE WAREHOUSE ==="
          kubectl get pods -n warehouse
